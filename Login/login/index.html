<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RutaClara — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
  <div class="login-logo">Ruta<em>Clara</em></div>
  <div class="login-sub">Sistema de Mantenimiento · Riwi</div>
  <div class="login-card">
    <div class="login-field">
      <label class="login-lbl">Correo Electronico</label>
      <input class="login-inp" id="login-email" type="email" placeholder="nombre@riwi.edu.co" >
    </div>
    <div class="login-field">
      <label class="login-lbl">Pin</label>
      <input class="login-inp" id="login-pass" type="password" placeholder="****">
    </div>
    <div class="login-field">
      
    </div>
    <button class="login-btn">Ingresar</button>
    <div class="login-err" id="login-err">Correo o Pin incorrectos</div>
  </div>
</div>

</body>
</html>
